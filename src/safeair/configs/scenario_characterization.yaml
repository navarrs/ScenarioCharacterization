# @package _global_

defaults:
  - _self_
  - visualizer: scored_scenario

# Root directory containing per-airport subdirectories of .pkl scenario files
scenarios_dir: data/sample/scenarios

# Root directory where JSON feature files are written
output_dir: data/sample/outputs/features

# Root directory where JSON score files are written
scores_dir: data/sample/outputs/scores

# Parallelism degree for interaction feature extractor; -1 uses all CPUs
n_jobs: 1

# Maximum number of individual feature rows to print per scenario
max_agents: 20

# Maximum number of interaction feature rows to print per scenario
max_pairs: 20

# Root directory containing per-airport map .pkl files ({maps_dir}/{airport_id}/{airport_id}.pkl).
# Set to null to skip map-dependent features.
maps_dir: data/graph_data_a42v01

# Root directory where scenario visualizations (.png) are saved. Set to null to disable.
viz_dir: data/sample/outputs/viz

# Root directory where per-scenario text summaries and per-airport airport_summary.txt files are saved.
# Set to null to disable.
summaries_dir: data/sample/outputs/summaries

# Root directory for feature distribution plots. Set to null to disable.
plots_dir: data/sample/outputs/stats

# Processor paths required by the visualizer config (scored_scenario.yaml).
# assets_path and graph_data_path mirror assets_dir and maps_dir above.
processor:
  assets_path: ${assets_dir}
  graph_data_path: ${maps_dir}
  airport: null  # overridden per-airport at runtime

# Top-level assets_dir kept for backward compatibility; used to populate processor.assets_path above.
assets_dir: data/assets
