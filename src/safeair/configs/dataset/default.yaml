_target_: safeair.datasets.base_dataset.BaseDataset

load_data: true
split: null
num_data_to_consider: null

dataset_name: ${scenario.dataset_name}
past_len: ${scenario.past_len}
future_len: ${scenario.future_len}

graph_data_path: ${paths.graph_data_path}

train_data_path: ${paths.train_data_path}
train_data_tag: ${paths.train_data_tag}
train_split_path: ${paths.train_split_path}

val_data_path: ${paths.val_data_path}
val_data_tag: ${paths.val_data_tag}
val_split_path: ${paths.val_split_path}

test_data_path: ${paths.test_data_path}
test_data_tag: ${paths.test_data_tag}
test_split_path: ${paths.test_split_path}

temp_path: ${paths.temp_path}
cache_path: ${paths.data_cache_path}
use_cache: false
overwrite_cache: ${overwrite_cache}
store_data_in_memory: false

# Attributes that can be masked out from training / evaluation. Everytime these are changed user needs to re-process
# data with overwrite_cache=True
masked_attributes: [
  # 'altitude',
  # 'heading',
  # 'velocity',
  # 'acceleration'
]
agent_type: [
  'AIRCRAFT',
  'VEHICLE',
  'UNKNOWN',
]
agent_selection_heuristic: closest_to_ego
map_selection_heuristic: closest_to_ego

# When true: one sample per scenario, predict only the ego agent (marginal prediction, K=1).
# When false: one sample per scenario centered on the ego, also predicting all other agents listed in agents_to_predict
#   simultaneously (joint prediction, K>1). The model is expected to produce decoded_trajectories of shape
#   (B, M, K, F, 7), and joint GT keys are added to the batch.
only_train_on_ego: true

is_benchmark_dataset: false
max_num_agents: ${model.max_num_agents}
max_num_map_elements: ${model.max_num_map_elements}
max_num_graph_nodes: ${model.max_num_graph_nodes}
max_num_graph_edges: ${model.max_num_graph_edges}
