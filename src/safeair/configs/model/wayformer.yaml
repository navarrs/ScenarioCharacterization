defaults:
  - default.yaml

_target_: safeair.models.wayformer.Wayformer
model_name: wayformer

# Add model tags
base_tags: lr-${model.optimizer.lr}_batch-size-${model.train_batch_size}
extra_tags: ${model.base_tags}

# Scenario Embedder
scenario_embedder_tags: num-enc-queries-${model.scenario_embedder.num_encoder_queries}_num-dec-queries-${model.scenario_embedder.num_decoder_queries}
scenario_embedder:
  _target_: safeair.models.scene.perceiver_embedder.PerceiverEmbedder
  num_encoder_queries: 6
  num_decoder_queries: 6
  hidden_size: 256
  query_init_scale: 0.1

# Motion Decoder
motion_decoder:
  _target_: safeair.models.scene.decoder.TrajectoryDecoder
  num_modes: ${model.num_modes}
  decoding_length: ${scenario.future_len.1}
  hidden_size: 256

# Model's optimization criterion
criterion:
  _target_: safeair.models.criterion.trajpred.TrajectoryPrediction
  rho_limit: 0.5
