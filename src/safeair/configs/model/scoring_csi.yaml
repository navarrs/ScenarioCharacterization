defaults:
  - default.yaml

_target_: safeair.models.scoring_csi.ScoringCSI
model_name: scoring-csi

# Add model tags
base_tags: null
extra_tags: null

# ScoringCSI-specific parameters
min_history_points: 2  # Minimum number of valid history frames required for Kalman filter prediction
timestep_duration_s: 1.0  # Duration of each timestep in seconds; used to convert position differences to speeds
lateral_separation_breach: 0.1  # XY distance threshold (coordinate units) for loss of separation breach detection
vertical_separation_breach: 0.3  # Altitude difference threshold (coordinate units) for loss of separation breach detection
agent_to_conflict_point_max_distance: 1.0  # Max distance (coordinate units) from conflict point for MTTCP computation
debug_viz: true  # Set to true to save per-scenario debug plots to ./data/debug/<dataset_name>/<scenario_id>.png
debug_path: ./data/debug  # Base path for saving debug visualizations
