defaults:
  - default.yaml

_target_: safeair.scenario_processor.critical_scenario_processor.CriticalScenarioProcessor

graph_data_version: a42v01
graph_data_path: ${paths.base_path}/graph_data_${processor.graph_data_version}

traj_data_version: csb
traj_data_path: ${paths.base_path}/traj_data_${processor.traj_data_version}
metadata_path: ${processor.traj_data_path}/metadata

skip: 1
airport: [
  # keep-sorted start
  "katl",
  "kbos",
  "kdca",
  "kdfw",
  "kewr",
  "khou",
  "kjfk",
  "klas",
  "klax",
  "klga",
  "kmco",
  "kmdw",
  "kmem",
  "kmia",
  "kmsy",
  "kord",
  "ksan",
  "ksea",
  "ksfo",
  "kslc",
  "panc",
  # keep-sorted end
] # ICAO code or use keyword all for all airports
train_val_test_split: [0.0, 0.0, 1.0]
