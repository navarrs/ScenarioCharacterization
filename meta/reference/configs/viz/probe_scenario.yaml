defaults:
  - scenario.yaml

name: probe_scenario
add_title: true
use_latlon: false
display_agent_ids: false
probe_color: "black"
display_only_critical_actypes: false

# Probe visualization options
show_probe_metadata: true
show_criticality_label: true
show_agent_distance_lines: true
probe_halo_size: 80
probe_ring_size: 120
probe_criticality_marker_size: 50
agent_zoom:
  AIRCRAFT: 0.007
  VEHICLE: 0.10
  UNKNOWN: 0.007

panes_to_plot:
  - ALL_AGENTS
  - COUNTERFACTUAL_PROBE
